<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holy Bible</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Notification Container -->
    <div id="notification-container"></div>

    <!-- Main Menu (Bible Book Style) -->
    <div id="bible-menu" class="hidden">
        <div class="bible-book">
            <div class="book-spine"></div>
            <div class="book-cover">
                <div class="cover-ornament top-left"></div>
                <div class="cover-ornament top-right"></div>
                <div class="cover-ornament bottom-left"></div>
                <div class="cover-ornament bottom-right"></div>
                <div class="book-title">
                    <i class="fas fa-cross"></i>
                    <h1>Holy Bible</h1>
                    <div class="title-decoration"></div>
                </div>
            </div>
            <div class="book-pages">
                <div class="page-header">
                    <i class="fas fa-book-bible"></i>
                    <span id="menu-title">Sacred Actions</span>
                </div>
                <div class="page-content" id="menu-options">
                    <!-- Menu options will be inserted here -->
                </div>
                <div class="page-footer">
                    <span class="footer-text">Press <kbd>ESC</kbd> to close</span>
                </div>
            </div>
        </div>
    </div>

     <!-- SERMON PARCHMENT DISPLAY -->
    <div id="sermon-display" class="hidden">
        <div class="sermon-parchment">
            <!-- Top scroll roll -->
            <div class="scroll-roll top-roll">
                <div class="roll-end left"></div>
                <div class="roll-center"></div>
                <div class="roll-end right"></div>
            </div>
            
            <!-- Main parchment content -->
            <div class="parchment-body">
                <!-- Header -->
                <div class="sermon-header">
                    <div class="sermon-icon">
                        <i class="fas fa-church"></i>
                    </div>
                    <div class="sermon-title-area">
                        <h2 id="sermon-priest-name">Priest John Smith</h2>
                        <span class="sermon-subtitle">speaks unto the congregation</span>
                    </div>
                </div>
                
                <!-- Decorative divider -->
                <div class="sermon-divider">
                    <span class="divider-ornament">❦</span>
                </div>
                
                <!-- Scrollable sermon text -->
                <div class="sermon-content" id="sermon-content">
                    <div class="sermon-text-wrapper" id="sermon-text-wrapper">
                        <p id="sermon-text">
                            <!-- Sermon text will be inserted here -->
                        </p>
                    </div>
                </div>
                
                <!-- Footer -->
                <div class="sermon-footer">
                    <div class="sermon-divider bottom">
                        <span class="divider-ornament">✠</span>
                    </div>
                    <div class="sermon-timer">
                        <i class="fas fa-hourglass-half"></i>
                        <span id="sermon-timer-text">60s remaining</span>
                    </div>
                    <div class="sermon-progress-bar">
                        <div class="sermon-progress-fill" id="sermon-progress"></div>
                    </div>
                    <span class="sermon-hint">Press <kbd>BACKSPACE</kbd> to dismiss</span>
                </div>
            </div>
            
            <!-- Bottom scroll roll -->
            <div class="scroll-roll bottom-roll">
                <div class="roll-end left"></div>
                <div class="roll-center"></div>
                <div class="roll-end right"></div>
            </div>
        </div>
    </div>

    <!-- Input Dialog -->
    <div id="input-dialog" class="hidden">
        <div class="dialog-overlay"></div>
        <div class="dialog-container">
            <div class="dialog-header">
                <i class="fas fa-feather-pointed"></i>
                <h2 id="dialog-title">Enter Your Message</h2>
            </div>
            <div class="dialog-body" id="dialog-inputs">
                <!-- Inputs will be inserted here -->
            </div>
            <div class="dialog-footer">
                <button class="dialog-btn cancel-btn" id="dialog-cancel">
                    <i class="fas fa-times"></i> Cancel
                </button>
                <button class="dialog-btn confirm-btn" id="dialog-confirm">
                    <i class="fas fa-check"></i> Confirm
                </button>
            </div>
        </div>
    </div>

    <!-- Loading/Processing Overlay -->
    <div id="loading-overlay" class="hidden">
        <div class="loading-content">
            <div class="loading-cross">
                <i class="fas fa-cross fa-spin"></i>
            </div>
            <span class="loading-text">Blessing in progress...</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
